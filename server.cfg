// promod live v2 - sample server config v1.4
// for public ruleset customizations, see z_c_r.iwd

// info strings
sets _Admin "24K_Me"
sets _Website "24KME.RF.GD"
sets _Email ""
sets _TeamSpeak3 ""
sets _Location "SRI LANKA"
sets _Mod "Promod Live 2.20"
sets _ModVer "2.20"
sets _ModUpdate "Yes"
sets _Maps "COD4 Stock"
sets _Type "Search and Destroy"
sets sv_hostname "^2HAVOC ^7SCRIM ^1SERVER"
loadplugin libcod4x_http_plugin

// welcome message, message of the day (motd)
seta scr_motd "If you want to host a ^1Scrim server contact 000000000 ^FB group ^4fb"

// password settings
set rcon_password "zeneztemp" // read server_setup.txt why we don't specify rcon password here
set sv_privatePassword "12345ggwp" // private slots password
set g_password "havoc12345" // server password

// player slots, maxclients - privateclients = public slots
set sv_maxclients "12" // maximum number of clients
set sv_privateclients "" // number of private slots

// client download settings
seta sv_wwwDownload "1" // enable download redirection
seta sv_wwwBaseURL "" // defines url to download from
seta sv_wwwDlDisconnected "0" // disconnect clients while downloading

// map rotation
set sv_maprotationcurrent "" // leave empty
set sv_mapRotation "map mp_backlot map mp_citystreets map mp_crash map mp_crossfire map mp_strike"

// promod settings
set promod_mode "match_mr12" // promod mode, for a list of promod modes see attached readme
set promod_enable_scorebot "0" // match-modes only